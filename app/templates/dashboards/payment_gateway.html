{% extends "customer_layout_navbar.html" %}
{% block content %}

<style>
/* ===== Progress Steps ===== */
.progress-steps {
    display: flex;
    justify-content: space-between;
    margin: 40px 0 50px 0;
    position: relative;
}
.progress-steps::before {
    content: '';
    position: absolute;
    top: 22px;
    left: 10%;
    right: 10%;
    height: 3px;
    background: #e0e0e0;
    z-index: 1;
}
.step {
    text-align: center;
    position: relative;
    z-index: 2;
    transition: .3s;
}
.step-number {
    width: 45px;
    height: 45px;
    background: #2c3e50;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-weight: bold;
    border: 3px solid white;
    box-shadow: 0 0 0 3px #2c3e50;
}
.step-text {
    font-size: 0.9rem;
    color: #6c757d;
    font-weight: 500;
}
.step.active .step-number {
    background: #e74c3c;
    box-shadow: 0 0 0 3px #e74c3c;
}
.step.active .step-text {
    color: #e74c3c;
    font-weight: 700;
}
.step-icon {
    width: 42px;
    margin-bottom: 6px;
    display: block;
}

/* Payment Card */
.payment-box {
    background: white;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    max-width: 550px;
    margin: auto;
    transition: .3s;
}
.payment-box:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 55px rgba(0,0,0,0.15);
}

/* Pay Button */
.pay-btn {
    width: 100%;
    padding: 16px;
    border-radius: 50px;
    border: none;
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #ff512f 0%, #dd2476 100%);
    box-shadow: 0 8px 24px rgba(221, 36, 118, 0.35);
    transition: all 0.35s ease;
}
.pay-btn:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 12px 32px rgba(221, 36, 118, 0.5);
    color: white;
}

/* Payment Logos */
.payment-logos img {
    height: 30px;
    margin: 0 8px;
    filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.2));
}

.secure-note {
    margin-top: 20px;
    color: #6c757d;
}

</style>


<div class="container mt-5">

    <!-- ===== PROGRESS STEPS (TOP) ===== -->
    <div class="progress-steps">
        <div class="step">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" class="step-icon">
            <div class="step-number">1</div>
            <div class="step-text">Cart</div>
        </div>

        <div class="step">
            <img src="https://cdn-icons-png.flaticon.com/512/456/456212.png" class="step-icon">
            <div class="step-number">2</div>
            <div class="step-text">Details</div>
        </div>

        <div class="step active">
            <img src="https://cdn-icons-png.flaticon.com/512/891/891407.png" class="step-icon">
            <div class="step-number">3</div>
            <div class="step-text">Payment</div>
        </div>

        <div class="step">
            <img src="https://cdn-icons-png.flaticon.com/512/845/845646.png" class="step-icon">
            <div class="step-number">4</div>
            <div class="step-text">Complete</div>
        </div>
    </div>


    <!-- ===== Payment Box ===== -->
    <div class="payment-box mt-4">

        <h2 class="fw-bold mb-3 text-center">💳 Online Payment</h2>

        <!-- Payment Method Logos -->
        <div class="payment-logos text-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/DiscoverCard.svg/1200px-DiscoverCard.svg.png?20160310220409">
        </div>

        <p class="text-center mb-4">
            Order ID: <strong>{{ order.id }}</strong><br>
            Total Amount: <strong>LKR {{ order.total }}</strong>
        </p>

        <form action="{{ url_for('customer.payment_success', order_id=order.id) }}" method="POST">

            <div class="mb-4">
                <label class="payment-label mb-2">Cardholder Name</label>
                <input type="text" class="form-control p-3" placeholder="John Doe" required>
            </div>

            <div class="mb-4">
                <label class="payment-label mb-2">Card Number</label>
                <input type="text" class="form-control p-3" placeholder="xxxx xxxx xxxx xxxx" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="payment-label mb-2">Expiry</label>
                    <input type="text" class="form-control p-3" placeholder="MM/YY" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="payment-label mb-2">CVV</label>
                    <input type="password" class="form-control p-3" placeholder="***" required>
                </div>
            </div><br>

            <button class="pay-btn mt-3">
                <i class="fas fa-lock me-2"></i> Pay Now
            </button>

            <p class="secure-note text-center">
                🔒 Secure payment — SSL Encrypted
            </p>
        </form>
    </div>

</div>

{% endblock %}
