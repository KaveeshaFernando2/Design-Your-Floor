{% extends 'supplier_layout_navbar.html' %}

{% block content %}
<style>
    html, body {
        height: 100%;
    }

    
    .side-card {
        background: #fff;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #e5e7eb;
        height: 100%;
    }

    .form-section-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        padding-bottom: 5px;
        border-bottom: 2px solid #f0f0f0;
    }

    .form-control, .form-select {
        border-radius: 8px;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
    }

    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 3px rgba(13,110,253,0.4);
    }

    .img-preview-box {
        width: 100%;
        height: 320px;
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        padding: 10px;
        background: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .img-preview-box img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 10px;
    }

    .btn-submit {
        width: 220px;
        padding: 12px 0;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
    }

    /* Centering container */
    .center-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        /* Replace background-color with background-image */
    background-image: url("{{ url_for('static', filename='images/texture1.png') }}");
    background-size: cover;        /* cover the whole container */
    background-position: center;   /* center the image */
    background-repeat: no-repeat;  /* prevent tiling */
    }

    /* Make the form responsive */
    .form-wrapper {
        width: 100%;
        max-width: 1100px;
    }

    .page-title-card {
        text-align: center;
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.9);
        padding: 15px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        font-weight: 600;
        font-size: 26px;
    }
</style>

<div class="center-container">
    <div class="form-wrapper">
        <h2 class="page-title-card">Add Product</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="row g-4">

                <!-- LEFT SIDE — FORM CARD -->
                <div class="col-lg-8">
                    <div class="side-card">

                        <!-- Basic Information -->
                        <div class="form-section-title">Basic Information</div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="sku" class="form-label">SKU</label>
                                <input type="text" class="form-control" id="sku" name="sku" required>
                            </div>

                            <div class="col-md-6">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>

                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                            </div>
                        </div>

                        <!-- Product Details -->
                        <div class="form-section-title mt-4">Product Details</div>

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="brand" class="form-label">Brand</label>
                                <input type="text" class="form-control" id="brand" name="brand">
                            </div>

                            <div class="col-md-4">
                                <label for="price" class="form-label">Price (Rs)</label>
                                <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                            </div>

                            <div class="col-md-4">
                                <label for="stock" class="form-label">Stock</label>
                                <input type="number" class="form-control" id="stock" name="stock" value="0">
                            </div>
                        </div>

                        <!-- Dimensions -->
                        <div class="form-section-title mt-4">Dimensions (mm)</div>

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="width_mm" class="form-label">Width</label>
                                <input type="number" class="form-control" id="width_mm" name="width_mm">
                            </div>

                            <div class="col-md-4">
                                <label for="height_mm" class="form-label">Height</label>
                                <input type="number" class="form-control" id="height_mm" name="height_mm">
                            </div>

                            <div class="col-md-4">
                                <label for="thickness_mm" class="form-label">Thickness</label>
                                <input type="number" class="form-control" id="thickness_mm" name="thickness_mm">
                            </div>
                        </div>

                    </div>
                </div>

                <!-- RIGHT SIDE — IMAGE CARD -->
                <div class="col-lg-4">
                    <div class="side-card">

                        <div class="form-section-title">Product Image</div>

                        <label class="form-label">Upload Image</label>
                        <input type="file" class="form-control mb-3" id="image_file" name="image_file"
                               accept="image/*" onchange="previewImage(event)">

                        <div class="img-preview-box">
                            <img id="preview" src="{{ url_for('static', filename='images/no-image.png') }}">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="mt-4 text-center">
                <button type="submit" class="btn btn-success btn-submit">Add Product</button>
            </div>
        </form>
    </div>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    };
    if(event.target.files[0]){
        reader.readAsDataURL(event.target.files[0]);
    }
}
</script>

{% endblock %}
